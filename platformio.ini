; ESP32-C6 Dual-Universe Bidirectional DMX Node
; Protocols: ENTTEC USB Pro (native USB) + Art-Net 4 (WiFi)

[env:esp32-c6-devkitc-1]
; pioarduino = community fork of espressif32 with arduino-esp32 3.x (ESP32-C6 support)
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board     = esp32-c6-devkitc-1
framework = arduino

; 160 MHz (stable for UART + WiFi)
board_build.f_cpu = 160000000L

; Enable Native USB CDC + dual CDC (CDC0=ENTTEC, CDC1=config terminal)
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CFG_TUD_CDC=2

; Monitor on native USB CDC1 (config terminal) — open whichever COM port is not ENTTEC
monitor_speed = 115200

; Libraries
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; Upload via CH340 UART bridge (COM port USB-C)
upload_protocol = esptool

; Partitions: minimal SPIFFS = more app space
board_build.partitions = min_spiffs.csv
