; ESP32-C6 Triple-Universe Bidirectional DMX Node
; Protocol: Art-Net 4 (WiFi) | Config terminal (native USB Serial/JTAG)
;
; Note: ESP32-C6 has no USB-OTG hardware. Native USB is a single-channel
; USB Serial/JTAG (HWCDC). ENTTEC USB Pro emulation is not available on
; this board variant; use Art-Net over WiFi for DMX control.

[env:esp32-c6-devkitc-1]
; pioarduino = community fork of espressif32 with arduino-esp32 3.x (ESP32-C6 support)
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board     = esp32-c6-devkitc-1
framework = arduino

; 160 MHz (stable for UART + WiFi)
board_build.f_cpu = 160000000L

; Enable Native USB Serial/JTAG (HWCDC) — single config terminal COM port
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Monitor on native USB HWCDC — NOT the CH340 port (UART0 is repurposed for DMX after boot)
; Set this to whichever COM port Windows assigns to the native USB interface (not CH340).
; Find it in Device Manager under "USB Serial Device" (not "USB-SERIAL CH340").
monitor_port = COM4
monitor_speed = 115200

; Libraries
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; Upload via CH340 UART bridge (COM port USB-C)
upload_protocol = esptool

; Partitions: minimal SPIFFS = more app space
board_build.partitions = min_spiffs.csv
